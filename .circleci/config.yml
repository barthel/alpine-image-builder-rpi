version: 2.1

workflows:
  version: 2.1
  build_and_deploy:
    jobs:
      - build:
          filters:
            tags:
              only: /.*/
          context:
            - "github"
            - "Docker Hub"

jobs:
  build:
    machine:
      image: ubuntu-2404:current
    steps:
      - checkout

      - run:
          name: Run Docker login
          command: |
            echo $DOCKER_PASS | docker login -u $DOCKER_USER --password-stdin

      - run:
          name: Run Shellcheck
          command: |
            make shellcheck

      - run:
          name: Create SD image
          command: |
            if [ -n "${CIRCLE_TAG}" ]; then
              export BASE_TAG="${CIRCLE_TAG%.*}"
              export ALPINE_OS_VERSION="${CIRCLE_TAG%.*}"
            else
              export BASE_TAG="latest"
              export ALPINE_OS_VERSION="latest"
            fi
            VERSION="${CIRCLE_TAG:-latest}" BASE_TAG="${BASE_TAG}" make sd-image
          no_output_timeout: 1800

      - run:
          name: Prepare artifacts
          command: |
            mkdir -p output
            mv alpineos*.zip* output/

      - run:
          name: Deploy
          command: |
            if [ -n "${CIRCLE_TAG}" ]; then
              go install github.com/tcnksm/ghr@latest
              PRE=""
              if [[ $CIRCLE_TAG = *"rc"* ]]; then
                PRE="-prerelease"
              fi
              ~/go/bin/ghr ${PRE} -u "${GITHUB_USER}" "${CIRCLE_TAG}" output/
            fi

      - store_artifacts:
          path: /home/circleci/project/output
