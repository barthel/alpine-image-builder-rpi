version: 2.1

workflows:
  version: 2.1
  build_and_deploy:
    jobs:
      - build:
          filters:
            tags:
              only: /.*/
          context:
            - "github"
            - "Docker Hub"

jobs:
  build:
    machine:
      image: ubuntu-2404:current
    steps:
      - checkout

      - run:
          name: Run Docker login
          command: |
            echo $DOCKER_PASS | docker login -u $DOCKER_USER --password-stdin

      - run:
          name: Run Shellcheck
          command: |
            docker build --build-arg BASE_TAG=latest -t alpine-image-builder-rpi .
            docker run --rm alpine-image-builder-rpi \
              bash -c 'shellcheck /builder/build.sh /builder/chroot-script.sh'

      - run:
          name: Set up QEMU binfmt handlers
          command: |
            docker run --rm --privileged multiarch/qemu-user-static --reset -p yes

      - run:
          name: Create SD image
          command: |
            VERSION="${CIRCLE_TAG}" ./build.sh
          no_output_timeout: 1800

      - run:
          name: Collect artifacts
          command: |
            mkdir -p output
            mv alpineos*.zip* output/ 2>/dev/null || true

      - store_artifacts:
          path: /home/circleci/project/output
